<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body,html{background:transparent}
#ng{font-family:'Share Tech Mono','Courier New',monospace;color:#dde6ff;padding:16px;user-select:none}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.logo{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;letter-spacing:0.05em;color:#dde6ff}
.logo span{color:#00dcf0;text-shadow:0 0 14px rgba(0,220,240,0.6)}
.icon{font-size:20px;color:#00dcf0;animation:float 2.5s ease-in-out infinite}
@keyframes float{0%,100%{filter:drop-shadow(0 0 8px #00dcf0)}50%{filter:drop-shadow(0 0 18px #00dcf0)}}
.layout{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start}
.grid-wrap{display:flex;flex-direction:column;gap:10px;align-items:center}
#grid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;padding:12px;background:rgba(6,8,17,0.95);border:1px solid rgba(255,255,255,0.07);border-radius:12px;width:340px;height:340px}
.c{border-radius:3px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:background 0.12s,border-color 0.12s,transform 0.08s,box-shadow 0.18s;position:relative}
.c:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.18);transform:scale(1.06)}
.c.wall{background:rgba(16,18,32,0.98);border-color:rgba(70,80,130,0.35);cursor:pointer}
.c.wall:hover{background:rgba(30,32,55,0.98);transform:scale(0.95)}
.c.start{background:rgba(30,100,255,0.22);border-color:rgba(80,150,255,0.8);box-shadow:0 0 10px rgba(80,150,255,0.45);cursor:default}
.c.end{background:rgba(30,200,120,0.22);border-color:rgba(60,220,140,0.8);box-shadow:0 0 10px rgba(60,220,140,0.45);cursor:default}
.c.path{background:rgba(0,220,240,0.14);border-color:rgba(0,220,240,0.5);box-shadow:0 0 7px rgba(0,220,240,0.28);animation:pr 0.22s ease}
@keyframes pr{from{background:rgba(0,220,240,0.5);transform:scale(1.12)}to{background:rgba(0,220,240,0.14);transform:scale(1)}}
.c.agent{background:rgba(255,180,0,0.35);border-color:rgba(255,200,50,0.9);box-shadow:0 0 16px rgba(255,200,50,0.7),0 0 35px rgba(255,180,0,0.28);animation:ap 0.45s ease-in-out infinite alternate;z-index:2}
@keyframes ap{from{transform:scale(1.06);box-shadow:0 0 16px rgba(255,200,50,0.7)}to{transform:scale(1.16);box-shadow:0 0 26px rgba(255,220,80,0.9)}}
.legend{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.leg{font-size:10px;padding:3px 8px;border-radius:12px;border:1px solid;letter-spacing:0.06em;font-weight:600}
.leg-s{color:rgba(80,150,255,1);border-color:rgba(80,150,255,0.5);background:rgba(80,150,255,0.08)}
.leg-e{color:rgba(60,220,140,1);border-color:rgba(60,220,140,0.5);background:rgba(60,220,140,0.08)}
.leg-p{color:rgba(0,220,240,1);border-color:rgba(0,220,240,0.5);background:rgba(0,220,240,0.08)}
.leg-w{color:rgba(140,150,200,0.8);border-color:rgba(140,150,200,0.3);background:rgba(20,20,40,0.4)}
.leg-a{color:rgba(255,200,50,1);border-color:rgba(255,200,50,0.5);background:rgba(255,200,50,0.08)}
.panel{display:flex;flex-direction:column;gap:16px;background:rgba(8,10,22,0.92);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:20px 18px;min-width:240px;flex:1}
.phead{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.dot-live{width:7px;height:7px;border-radius:50%;background:#00ff88;box-shadow:0 0 7px #00ff88;animation:blink 1.4s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.28}}
.plabel{font-size:9.5px;letter-spacing:0.17em;color:rgba(255,255,255,0.4);font-weight:700;text-transform:uppercase}
.sec-label{font-size:9px;letter-spacing:0.12em;color:rgba(255,255,255,0.35);margin-bottom:6px;display:block;text-transform:uppercase}
.algos{display:flex;flex-direction:column;gap:6px}
.abtn{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:9px 11px;cursor:pointer;text-align:left;transition:all 0.15s;width:100%}
.abtn:hover:not(:disabled){background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.15);transform:translateX(2px)}
.abtn:disabled{opacity:0.45;cursor:not-allowed}
.abtn-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.abtn-name{font-size:12px;font-weight:600;color:rgba(255,255,255,0.8)}
.badge{font-size:8.5px;font-weight:700;letter-spacing:0.08em;padding:2px 6px;border-radius:3px}
.bg{background:rgba(255,190,0,0.14);color:rgba(255,200,50,0.9);border:1px solid rgba(255,200,50,0.28)}
.bb{background:rgba(80,150,255,0.14);color:rgba(100,170,255,0.9);border:1px solid rgba(80,150,255,0.28)}
.bp{background:rgba(160,80,255,0.14);color:rgba(180,100,255,0.9);border:1px solid rgba(160,80,255,0.28)}
.abtn-desc{font-size:10px;color:rgba(255,255,255,0.38)}
.abtn.active-g{background:rgba(255,190,0,0.07);border-color:rgba(255,200,50,0.45)}
.abtn.active-b{background:rgba(80,150,255,0.07);border-color:rgba(80,150,255,0.45)}
.abtn.active-p{background:rgba(160,80,255,0.07);border-color:rgba(160,80,255,0.45)}
.speed-row{display:flex;align-items:center;gap:10px}
.speed-row span{font-size:10px;color:rgba(255,255,255,0.5);min-width:44px;text-align:right}
input[type=range]{flex:1;accent-color:#00dcf0;height:4px}
.acts{display:flex;gap:8px}
.run-btn{flex:1;background:linear-gradient(135deg,rgba(0,200,240,0.75),rgba(0,120,200,0.75));color:#fff;border:none;border-radius:8px;font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;cursor:pointer;padding:11px 12px;transition:all 0.16s;display:flex;align-items:center;justify-content:center;gap:7px}
.run-btn:hover:not(:disabled){background:linear-gradient(135deg,rgba(0,220,255,0.88),rgba(0,140,220,0.88));box-shadow:0 0 22px rgba(0,220,240,0.35);transform:translateY(-1px)}
.run-btn:disabled{opacity:0.42;cursor:not-allowed;transform:none}
.rst-btn{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.65);border:1px solid rgba(255,255,255,0.1);border-radius:8px;font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.08em;cursor:pointer;padding:11px 14px;transition:all 0.16s}
.rst-btn:hover:not(:disabled){background:rgba(255,80,80,0.1);border-color:rgba(255,80,80,0.35);color:rgba(255,120,120,0.9)}
.rst-btn:disabled{opacity:0.35;cursor:not-allowed}
.spinner{width:11px;height:11px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.blink-dot{width:7px;height:7px;background:#ffc820;border-radius:50%;box-shadow:0 0 5px #ffc820;animation:blink 0.5s ease-in-out infinite}
.status{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.05);background:rgba(255,255,255,0.02);transition:all 0.28s}
.sdot{width:5px;height:5px;border-radius:50%;margin-top:4px;flex-shrink:0}
.s-idle .sdot{background:rgba(255,255,255,0.28)}
.s-loading .sdot{background:#00ccff;box-shadow:0 0 5px #00ccff;animation:blink 0.5s ease-in-out infinite}
.s-success .sdot{background:#00ff88;box-shadow:0 0 5px #00ff88}
.s-error .sdot{background:#ff5555;box-shadow:0 0 5px #ff5555}
.s-animate .sdot{background:#ffcc00;box-shadow:0 0 5px #ffcc00;animation:blink 0.4s ease-in-out infinite}
.s-success{border-color:rgba(0,255,136,0.18);background:rgba(0,255,136,0.04)}
.s-error{border-color:rgba(255,85,85,0.18);background:rgba(255,85,85,0.04)}
.s-animate{border-color:rgba(255,200,50,0.18);background:rgba(255,200,50,0.04)}
.smsg{font-size:11px;color:rgba(255,255,255,0.68);line-height:1.45}
.smeta{font-size:10px;color:rgba(0,220,240,0.8);margin-top:3px}
.hint{font-size:10px;color:rgba(255,255,255,0.27);line-height:1.6;border-top:1px solid rgba(255,255,255,0.05);padding-top:12px}
</style>
<div id="ng">
  <div class="hdr">
    <span class="icon">◈</span>
    <span class="logo">NEURO<span>GRID</span></span>
    <span style="font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.14em;margin-left:4px">LIVE DEMO</span>
  </div>
  <div class="layout">
    <div class="grid-wrap">
      <div id="grid"></div>
      <div class="legend">
        <span class="leg leg-s">Start</span>
        <span class="leg leg-e">End</span>
        <span class="leg leg-p">Path</span>
        <span class="leg leg-w">Wall</span>
        <span class="leg leg-a">Agent</span>
      </div>
    </div>
    <div class="panel">
      <div class="phead">
        <div class="dot-live"></div>
        <span class="plabel">AI Control Panel</span>
      </div>
      <div>
        <span class="sec-label">Algorithm</span>
        <div class="algos" id="algos"></div>
      </div>
      <div>
        <span class="sec-label" style="display:flex;justify-content:space-between">Speed <span id="spd-label" style="color:rgba(255,255,255,0.6)">MEDIUM</span></span>
        <div class="speed-row">
          <input type="range" min="1" max="3" value="2" id="spd">
        </div>
      </div>
      <div class="acts">
        <button class="run-btn" id="runBtn" onclick="runAI()">▶ RUN AI</button>
        <button class="rst-btn" id="rstBtn" onclick="resetAll()">↺ RESET</button>
      </div>
      <div class="status s-idle" id="status">
        <div class="sdot"></div>
        <div><div class="smsg">Click cells to place walls, then press RUN AI.</div></div>
      </div>
      <div class="hint">
        <p>Start = (0,0) · End = (9,9)</p>
        <p>Frontend demo uses built-in JS algorithms.<br>In production, connects to FastAPI backend.</p>
      </div>
    </div>
  </div>
</div>
<script>
const ROWS=10,COLS=10;
let grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));
let path=[],activeStep=-1,animTimer=null,busy=false;
let algo='astar',speed=2;

const ALGOS=[
  {v:'astar',n:'A* — Smart',b:'OPTIMAL',d:'Heuristic-guided. Fastest & optimal.',bc:'bg'},
  {v:'bfs',n:'BFS — Breadth-First',b:'SHORTEST',d:'Layer-by-layer. Guaranteed shortest.',bc:'bb'},
  {v:'dfs',n:'DFS — Depth-First',b:'DEEP DIVE',d:'Stack-based. Deep exploration first.',bc:'bp'},
];
const SPEED_MS={1:200,2:85,3:25};
const SPD_LABEL={1:'SLOW',2:'MEDIUM',3:'FAST'};

// Build algo buttons
const ac=document.getElementById('algos');
ALGOS.forEach(a=>{
  const btn=document.createElement('button');
  btn.className='abtn'+(a.v===algo?' active-'+a.bc.slice(1):'');
  btn.dataset.v=a.v;btn.dataset.bc=a.bc;
  btn.innerHTML=`<div class="abtn-top"><span class="abtn-name">${a.n}</span><span class="badge ${a.bc}">${a.b}</span></div><span class="abtn-desc">${a.d}</span>`;
  btn.onclick=()=>{if(busy)return;algo=a.v;document.querySelectorAll('.abtn').forEach(b=>{b.className='abtn';});btn.className='abtn active-'+a.bc.slice(1);};
  ac.appendChild(btn);
});

document.getElementById('spd').oninput=function(){speed=+this.value;document.getElementById('spd-label').textContent=SPD_LABEL[speed];};

// Build grid
function buildGrid(){
  const el=document.getElementById('grid');
  el.innerHTML='';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const d=document.createElement('div');
    d.className='c';
    d.dataset.r=r;d.dataset.c=c;
    d.onclick=()=>toggleCell(r,c);
    el.appendChild(d);
  }
}

function cellEl(r,c){return document.querySelector(`.c[data-r="${r}"][data-c="${c}"]`);}

function renderGrid(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const el=cellEl(r,c);
    if(!el)continue;
    const key=r+','+c;
    const isStart=r===0&&c===0,isEnd=r===9&&c===9;
    const paintedPath=new Set(path.slice(0,activeStep).map(p=>p[0]+','+p[1]));
    const isAgent=activeStep>=0&&activeStep<path.length&&path[activeStep][0]===r&&path[activeStep][1]===c&&!isStart&&!isEnd;
    const isPath=paintedPath.has(key)&&!isStart&&!isEnd&&!isAgent;
    el.className='c'+(grid[r][c]===1?' wall':'')+(isStart?' start':'')+(isEnd?' end':'')+(isAgent?' agent':'')+(isPath?' path':'');
  }
}

function toggleCell(r,c){
  if(busy)return;
  if(r===0&&c===0||r===9&&c===9)return;
  grid[r][c]=grid[r][c]===1?0:1;
  path=[];activeStep=-1;
  setStatus('idle','Click cells to place walls. Press RUN AI to solve.');
  renderGrid();
}

function setStatus(type,msg,meta){
  const el=document.getElementById('status');
  el.className='status s-'+type;
  el.innerHTML=`<div class="sdot"></div><div><div class="smsg">${msg}</div>${meta?`<div class="smeta">${meta}</div>`:''}</div>`;
}

function setRunBtn(html,disabled){
  const b=document.getElementById('runBtn');
  b.innerHTML=html;b.disabled=disabled;
}

// ─── JS Algorithms (in-browser, mirrors the Python backend) ─────
function bfs(g,start,end){
  const rows=g.length,cols=g[0].length;
  const q=[start],vis=new Set([start[0]+','+start[1]]),par={};
  par[start[0]+','+start[1]]=null;
  const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
  while(q.length){
    const [r,c]=q.shift();
    if(r===end[0]&&c===end[1])return reconstruct(par,start,end);
    for(const[dr,dc]of dirs){const nr=r+dr,nc=c+dc,k=nr+','+nc;if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&!vis.has(k)&&g[nr][nc]===0){vis.add(k);par[k]=[r,c];q.push([nr,nc]);}}
  }
  return null;
}

function dfs(g,start,end){
  const rows=g.length,cols=g[0].length;
  const stack=[start],vis=new Set([start[0]+','+start[1]]),par={};
  par[start[0]+','+start[1]]=null;
  const dirs=[[1,0],[0,-1],[-1,0],[0,1]];
  while(stack.length){
    const [r,c]=stack.pop();
    if(r===end[0]&&c===end[1])return reconstruct(par,start,end);
    for(const[dr,dc]of dirs){const nr=r+dr,nc=c+dc,k=nr+','+nc;if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&!vis.has(k)&&g[nr][nc]===0){vis.add(k);par[k]=[r,c];stack.push([nr,nc]);}}
  }
  return null;
}

function astar(g,start,end){
  const rows=g.length,cols=g[0].length;
  const h=(a,b)=>Math.abs(a[0]-b[0])+Math.abs(a[1]-b[1]);
  let open=[[h(start,end),0,start]];
  const gScore={[start[0]+','+start[1]]:0},par={[start[0]+','+start[1]]:null};
  const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
  while(open.length){
    open.sort((a,b)=>a[0]-b[0]);
    const[,,[r,c]]=open.shift();
    if(r===end[0]&&c===end[1])return reconstruct(par,start,end);
    const g0=gScore[r+','+c];
    for(const[dr,dc]of dirs){
      const nr=r+dr,nc=c+dc,k=nr+','+nc;
      if(nr<0||nr>=rows||nc<0||nc>=cols||g[nr][nc]===1)continue;
      const tg=g0+1;
      if(tg<(gScore[k]??Infinity)){gScore[k]=tg;par[k]=[r,c];open.push([tg+h([nr,nc],end),tg,[nr,nc]]);}
    }
  }
  return null;
}

function reconstruct(par,start,end){
  let cur=end,path=[];
  while(cur){path.push(cur);const k=cur[0]+','+cur[1];cur=par[k];}
  return path.reverse();
}

// ─── Run ─────────────────────────────────────────────────────────
function runAI(){
  if(busy)return;
  path=[];activeStep=-1;busy=true;
  setRunBtn('<span class="spinner"></span> SOLVING…',true);
  document.getElementById('rstBtn').disabled=true;
  setStatus('loading','Running '+algo.toUpperCase()+' pathfinder…');
  renderGrid();

  setTimeout(()=>{
    const fn={astar,bfs,dfs}[algo];
    const result=fn(grid,[0,0],[9,9]);
    if(!result||result.length===0){
      setStatus('error','No path found. Try removing some walls.');
      setRunBtn('▶ RUN AI',false);
      document.getElementById('rstBtn').disabled=false;
      busy=false;return;
    }
    path=result;
    setStatus('animate','Animating '+result.length+' steps…');
    setRunBtn('<span class="blink-dot"></span> NAVIGATING…',true);
    animate(0);
  },280);
}

function animate(step){
  if(step>=path.length){
    activeStep=-1;busy=false;
    setRunBtn('▶ RUN AI',false);
    document.getElementById('rstBtn').disabled=false;
    setStatus('success','Navigation complete.',`Path length: ${path.length} steps`);
    renderGrid();return;
  }
  activeStep=step;
  renderGrid();
  animTimer=setTimeout(()=>animate(step+1),SPEED_MS[speed]||85);
}

function resetAll(){
  if(animTimer)clearTimeout(animTimer);
  grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  path=[];activeStep=-1;busy=false;
  setRunBtn('▶ RUN AI',false);
  document.getElementById('rstBtn').disabled=false;
  setStatus('idle','Click cells to place walls. Press RUN AI to solve.');
  renderGrid();
}

buildGrid();renderGrid();
</script>
